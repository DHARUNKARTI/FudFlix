<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FudFlix</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

</head>
<body>
    <div class="container">
        <div class="icon-out">
            <div class="icon">
                <img src="./src/Icon.svg" alt="icon">
            </div>
        </div>
        <h1 class="title">FudFlix</h1>
        <div class="underline"></div>
        <div class="card-container">
            <img src="./src/a29398759b398441e152c5e4ab846e6bd3789742.jpg" alt="food1" class="img-left">
            <img src="./src/88a2011c37d8397c3dc1bd040b43a346092f6972.jpg" alt="food2" class="img-right">
            <div class="card-text">
                <h3 class="card-title">Curated for Campus</h3>
                <p class="card-para">Discover top-rated
meals delivered from
your favorite <br>
university kitchens.</p>
            </div>
        </div>
        <div class="desc">
            <h2>Your Campus. Your <br>
Canteens. Your Food.</h2>
            <p>The ultimate editorial dining experience,<br>
tailored for the academic lifestyle.</p>
        </div>
        <div class="get-started-container">
            <div class="get-started-text">
                <button>Get Started</button>
                <img src="./src/Icon.png" alt="">
            </div>
        </div>
    </div>
</body>
</html>
